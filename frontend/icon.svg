<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="AxonBIM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <!-- Wordmark: Axon (ámbar) + BIM (cian), ligera inclinación conjunta -->
  <g transform="translate(64,72) skewX(-8)" text-anchor="middle">
    <text x="-18" y="0" font-family="DejaVu Sans, Liberation Sans, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#f59e0b" letter-spacing="-1">Axon</text>
    <text x="22" y="0" font-family="DejaVu Sans, Liberation Sans, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#38bdf8" letter-spacing="2">BIM</text>
  </g>
  <text x="64" y="102" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="9" fill="#64748b" letter-spacing="3">OPEN · IFC</text>
</svg>

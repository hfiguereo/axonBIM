name: PR checks

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  conventional-commits:
    name: Conventional Commits (titulo del PR)
    runs-on: ubuntu-latest
    # Dependabot y otros bots siguen sus propias convenciones
    # (capitalizacion, scopes fijos). Su consistencia la garantiza el
    # bot, no este workflow.
    if: ${{ !contains(fromJSON('["dependabot[bot]", "renovate[bot]"]'), github.actor) }}
    steps:
      - name: Validar titulo
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            rpc
            geom
            ifc
            draw
            ui
            iso19650
            mived
            mopc
            normativa
            ci
            pkg
            docs
            repo
            deps
            deps-dev
            cli
            tests
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            El subject del titulo "{subject}" deberia empezar en minuscula.
